name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight environment check (CI-safe)
        env:
          LLM_PROVIDER: azure
          AZURE_OPENAI_ENDPOINT: https://example.openai.azure.com/
          AZURE_OPENAI_API_KEY: ci-placeholder
          AZURE_OPENAI_DEPLOYMENT: ci-deployment
        run: python ops/check_env.py --json

      - name: Compile check
        run: python -m compileall backend

      - name: Lint
        run: python -m ruff check .

      - name: Format check
        run: python -m ruff format --check .

      - name: Test with coverage gate
        run: python -m pytest
